  <circle cx="11" cy="15" r="0.75" fill="#000000"/> <!-- Black Pupil -->
  <circle cx="12" cy="14" r="0.3" fill="#FFFFFF"/> <!-- Eye Glint -->

  <circle cx="21" cy="15" r="2.5" fill="#FFFFFF"/>
  <circle cx="21" cy="15" r="1.5" fill="#90EE90"/> <!-- Light Green Iris -->
  <circle cx="21" cy="15" r="0.75" fill="#000000"/> <!-- Black Pupil -->
  <circle cx="22" cy="14" r="0.3" fill="#FFFFFF"/> <!-- Eye Glint -->

  <!-- Added Nose (Pink #FFC0CB) -->
  <path d="M14 18 L16 20 L18 18 L14 18 Z" fill="#FFC0CB"/>

  <!-- Added Mouth curve (White stroke) -->
  <path d="M14.5 22.5 C15.5 23.5 16.5 23.5 17.5 22.5" stroke="#FFFFFF" stroke-width="0.5" fill="none"/>

  <!-- Added Whiskers (Light Grey #E0E0E0 lines) -->
