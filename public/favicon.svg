  <line x1="14" y1="21" x2="7" y2="21" stroke="#E0E0E0" stroke-width="0.3"/>
  <line x1="14" y1="21.5" x2="8" y2="23" stroke="#E0E0E0" stroke-width="0.3"/>

  <line x1="18" y1="20.5" x2="24" y2="19" stroke="#E0E0E0" stroke-width="0.3"/>
  <line x1="18" y1="21" x2="25" y2="21" stroke="#E0E0E0" stroke-width="0.3"/>
  <line x1="18" y1="21.5" x2="24" y2="23" stroke="#E0E0E0" stroke-width="0.3"/>

  <!-- Added tiny tuft details to ear tips (White lines) -->
  <line x1="6" y1="3.5" x2="6.5" y2="4.5" stroke="#FFFFFF" stroke-width="0.3"/>
  <line x1="5.5" y1="4" x2="6" y2="5" stroke="#FFFFFF" stroke-width="0.3"/>
  <line x1="26" y1="3.5" x2="25.5" y2="4.5" stroke="#FFFFFF" stroke-width="0.3"/>
