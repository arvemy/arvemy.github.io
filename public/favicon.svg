  <path d="M7 6 C6.5 7.5 5.5 10 5.5 11 L9 10 C8.5 8 7.5 7 7 6 Z" fill="#FFC0CB"/>
  <path d="M25 6 C25.5 7.5 26.5 10 26.5 11 L23 10 C23.5 8 24.5 7 25 6 Z" fill="#FFC0CB"/>

  <!-- Added Eyes with details (White, Green, Black) -->
  <circle cx="11" cy="15" r="2.5" fill="#FFFFFF"/>
