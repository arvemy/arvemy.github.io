<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Original stylized cat silhouette -->
  <path d="M6 4L3 13C3 21 9 27 16 27C23 27 29 21 29 13L26 4L19 10C17.5 11 14.5 11 13 10L6 4Z" fill="#000000"/>

